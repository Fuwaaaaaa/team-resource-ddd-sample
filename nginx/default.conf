# 同一オリジンプロキシ:
#   /api          → Laravel backend (Sanctum SPA cookie のため同一 host で統一)
#   /sanctum      → Laravel backend
#   /up           → Laravel backend (health check)
#   それ以外       → Next.js frontend (/, /login UI, /admin/users, etc.)
#
# NOTE: /login は frontend (Next.js) のサインイン画面ルート。
# 認証 API は /api/login (Laravel)。
# 以前はここに /login と /logout を含めていたが、Laravel 側のログイン API は
# /api/login であって /login ではない (Laravel 11 の routes/api.php は自動的に
# /api prefix される) ため、GET /login を backend に流すと 404 になり、
# フロントエンドのログイン UI が永久に表示されなかった。

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # Laravel 直下にルーティングするパス
    location ~ ^/(api|sanctum|up) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
