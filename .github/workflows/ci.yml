name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    # Matrix runs Feature tests on BOTH sqlite (fast, in-memory) and pgsql
    # (production-equivalent). Without the pgsql cell the project shipped 2
    # bugs in one PR cycle that passed sqlite silently:
    #   - DomainEventStore::append used FOR UPDATE + max() (PR #26)
    #   - ChangeUserRoleHandler used FOR UPDATE + count() (in PR #27)
    # PostgreSQL rejects FOR UPDATE with aggregate functions (SQLSTATE 0A000).
    name: "Backend (PHPUnit, ${{ matrix.db }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, pgsql]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: team_resource_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_pgsql, intl, bcmath
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-all

      - name: Cache composer vendor
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.json', 'backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Unit tests
        run: vendor/bin/phpunit --testsuite=Unit

      - name: Feature tests (${{ matrix.db }})
        env:
          DB_CONNECTION: ${{ matrix.db }}
          DB_DATABASE: ${{ matrix.db == 'sqlite' && ':memory:' || 'team_resource_test' }}
          DB_HOST: ${{ matrix.db == 'pgsql' && 'localhost' || '' }}
          DB_PORT: ${{ matrix.db == 'pgsql' && '5432' || '' }}
          DB_USERNAME: ${{ matrix.db == 'pgsql' && 'app' || '' }}
          DB_PASSWORD: ${{ matrix.db == 'pgsql' && 'secret' || '' }}
        run: vendor/bin/phpunit --testsuite=Feature

  backend-lint:
    name: Backend (Pint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/pint --test

  smoke:
    # Boots the full docker compose stack and asserts the public URL surface
    # is reachable. Catches regressions like the Phase 7 nginx routing bug
    # (PR #28) where /login was permanently 404 for 6 weeks because nothing
    # checked an end-to-end browser-equivalent request through nginx.
    name: Smoke (docker compose URL surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        run: |
          cp .env.example .env || true
          # Make sure the compose stack has what it needs
          touch .env

      # docker-compose.yml mounts ./backend and ./frontend over the image's
      # /var/www/html and /app, which would shadow the vendor/ and
      # node_modules/ baked into the images. Pre-install on the host so the
      # volume mount is complete before containers start.
      - name: Setup PHP (for backend deps)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_pgsql, intl, bcmath
          coverage: none

      - name: composer install (backend)
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Setup Node (for frontend deps)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      - name: Boot stack
        run: docker compose up -d --build

      - name: Wait for nginx + backend + frontend ready
        run: |
          for i in $(seq 1 60); do
            login_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login || echo "000")
            me_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Accept: application/json" http://localhost:8080/api/me || echo "000")
            if [ "$login_code" = "200" ] && [ "$me_code" = "401" ]; then
              echo "stack ready (login=$login_code, api/me=$me_code)"
              exit 0
            fi
            echo "attempt $i: login=$login_code api/me=$me_code, sleeping..."
            sleep 5
          done
          echo "stack failed to come up within timeout"
          docker compose logs --tail=80
          exit 1

      - name: Assert URL surface
        run: |
          set -x  # echo each assertion so a failure shows which one

          # /login must be served by Next.js (200), NOT proxied to a non-existent
          # Laravel GET /login route (404) — the regression that PR #28 fixed.
          login_code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/login)
          test "$login_code" = "200" || { echo "FAIL /login: got $login_code, expected 200"; exit 1; }

          # /api/me must respond with 401 JSON when unauthenticated, NOT 500
          # (which would happen if the auth middleware tries to redirect to a
          # named 'login' route).
          me_code=$(curl -s -o /dev/null -w '%{http_code}' -H 'Accept: application/json' http://localhost:8080/api/me)
          test "$me_code" = "401" || { echo "FAIL /api/me: got $me_code, expected 401"; exit 1; }

          # / must redirect (307) toward /login when no XSRF cookie is set
          # (Next.js auth middleware behavior).
          home_code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/)
          test "$home_code" = "307" || { echo "FAIL /: got $home_code, expected 307"; exit 1; }

          # POST /api/login (no body, no CSRF) → 422 validation error
          # (email/password required). The point is the route is reachable on
          # the backend at /api/login — anything in the 4xx family that's not
          # 404 confirms reachability.
          api_login_code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Accept: application/json' http://localhost:8080/api/login)
          test "$api_login_code" = "422" || { echo "FAIL POST /api/login: got $api_login_code, expected 422"; exit 1; }

          echo "URL surface OK"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=200

  frontend-check:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

  e2e:
    # Playwright critical-path tests against the full docker compose stack.
    # Mirrors the smoke job's bring-up but adds browser-driven assertions
    # (login, RBAC, dashboard) on top of the surface-level health checks.
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        run: |
          cp .env.example .env || true
          touch .env

      # Pre-install host-side deps so the volume mounts don't shadow the
      # vendor/ and node_modules/ baked into the images. (Same reason as the
      # smoke job — see .github/workflows/ci.yml smoke.)
      - name: Setup PHP (for backend deps)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_pgsql, intl, bcmath
          coverage: none

      - name: composer install (backend)
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Boot stack
        run: docker compose up -d --build

      - name: Wait for nginx + backend + frontend ready
        run: |
          for i in $(seq 1 60); do
            login_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login || echo "000")
            me_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Accept: application/json" http://localhost:8080/api/me || echo "000")
            if [ "$login_code" = "200" ] && [ "$me_code" = "401" ]; then
              echo "stack ready (login=$login_code, api/me=$me_code)"
              exit 0
            fi
            echo "attempt $i: login=$login_code api/me=$me_code, sleeping..."
            sleep 5
          done
          echo "stack failed to come up within timeout"
          docker compose logs --tail=80
          exit 1

      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: Upload test artifacts (traces / videos / screenshots) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 14

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=200
